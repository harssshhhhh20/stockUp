services:

  postgres:
    image: postgres:17
    container_name: stockup-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: stockup
      POSTGRES_USER: stockup
      POSTGRES_PASSWORD: stockup

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: stockup-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: stockup-rabbitmq

    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: stockup
      RABBITMQ_DEFAULT_PASS: stockup

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq 

      
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: