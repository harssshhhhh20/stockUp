spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stockup
    username: stockup
    password: stockup

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: stockup
    password: stockup

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  otp:
    length: 6
    expiry-seconds: 300
    resend-wait-seconds: 60
    max-attempts-per-hour: 5

  jwt:
    issuer: stockup
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800
    secret: your-very-long-secret-key-change-this-before-production